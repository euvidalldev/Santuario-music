services:
  - type: web
    name: sanctuary-api
    env: node
    buildCommand: pip install yt-dlp --break-system-packages && pnpm install && pnpm --filter @workspace/api-server run build
    startCommand: pnpm --filter @workspace/api-server start
    envVars:
      - key: PORT
        value: "8080"
      - key: NODE_ENV
        value: production
      - key: YT_DLP_PATH
        value: /usr/local/bin/yt-dlp
